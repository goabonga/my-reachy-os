name: Generate ReachyMini OS Image

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
            lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted qemu-user-static debootstrap zerofree zip \
            dosfstools e2fsprogs libarchive-tools libcap2-bin grep rsync xz-utils file git curl bc \
            gpg pigz xxd arch-test bmap-tools kmod

      - name: Set VERSION environment variable
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Update stage2/05-reachy-mini/00-run.sh with version
        run: |
            sed -i "s|ReachyMiniOS: dev|ReachyMiniOS: ${{ env.VERSION }}|g" stage2/05-reachy-mini/00-run.sh

      - name: Make build.sh executable
        run: chmod +x build.sh

      - name: Build ReachyMini OS image
        run: sudo ./build.sh

      - name: Rename deploy files with version
        run: |
          for f in deploy/*.*; do
            ext="${f##*.}"
            base="${f%.*}"
            sudo mv "$f" "${base}-${VERSION}.${ext}"
          done
        env:
          VERSION: ${{ env.VERSION }}

      - name: Upload generated image
        uses: actions/upload-artifact@v4
        with:
            name: reachyminios-image-${{ env.VERSION }}
            path: deploy/*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        with:
            files: deploy/*
            generate_release_notes: true
